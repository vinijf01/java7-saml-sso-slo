# SAML 2.0 Service Provider Configuration
# This file is loaded by SamlConfig from either -Dconfig.path or classpath

# ══════════════════════════════════════════════════════════════════
# Service Provider (SP) Configuration
# ══════════════════════════════════════════════════════════════════

# SP Entity ID — identifies this service provider in SAML exchanges
sp.entity-id=urn:saml-poc:sp

# SP Callback URL — the URL where the IdP sends SAML responses
sp.callback-url=http://localhost:8080/service-poc/callbacksso

# Keystore Configuration — JKS file for SP signing/verification
sp.keystore.path=/usr/local/tomcat/config/samlKeystore.jks
sp.keystore.password=changeit
sp.keystore.private-key-password=changeit
sp.keystore.default-alias=saml-sp

# ══════════════════════════════════════════════════════════════════
# Identity Provider (IdP) Configuration
# ══════════════════════════════════════════════════════════════════

# IdP Metadata Path — XML metadata containing SSO/SLO endpoints
idp.metadata.path=/usr/local/tomcat/config/idp-metadata.xml

# ══════════════════════════════════════════════════════════════════
# Group Configuration (Group Mapping)
# ══════════════════════════════════════════════════════════════════

# Group Config Path — optional, defaults to group.xml in classpath
group.config.path=/usr/local/tomcat/config/group.xml
